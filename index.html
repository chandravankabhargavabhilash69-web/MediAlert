<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediLoop - Connecting Care. Reducing Waste.</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Fallback Service Worker Registration for PWA Offline Capability -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('MediLoop ServiceWorker registered successfully:', reg.scope);
          }).catch(err => {
            console.log('MediLoop ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
